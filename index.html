<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Click Empire</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon: #00ffcc; --gold: #ffcc00; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #0a001f, #1a0033); color: #eee; margin: 0; padding: 0; text-align: center; min-height: 100vh; }
        header { background: rgba(0,0,0,0.95); padding: 15px; border-bottom: 4px solid var(--neon); }
        h1 { margin: 0; font-size: clamp(1.8em, 5vw, 2.8em); text-shadow: 0 0 20px var(--neon); }
        .tabs { padding: 12px; background: #110022; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .tab { padding: 12px 24px; background: #2a0055; border: none; color: #ddd; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--neon); color: #000; }
        .panel { display: none; max-width: 1100px; margin: 15px auto; padding: 25px; background: rgba(20,0,50,0.9); border-radius: 20px; box-shadow: 0 0 40px rgba(0,255,200,0.3); }
        .panel.active { display: block; }
        #click-area { width: min(300px, 85vw); height: min(300px, 85vw); background: radial-gradient(circle, #ff00aa, #00ffff); border-radius: 50%; margin: 25px auto; display: flex; align-items: center; justify-content: center; font-size: clamp(1.8em, 8vw, 3em); font-weight: bold; cursor: pointer; box-shadow: 0 0 60px #00ffff; transition: all 0.1s; }
        #click-area:active { transform: scale(0.88); }
        .stats { font-size: clamp(1.3em, 5vw, 1.8em); margin: 12px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
        .item { background: #1a0033; padding: 20px; border-radius: 16px; border: 2px solid #440077; }
        .buy-btn { width: 100%; padding: 14px; background: #00cc66; border: none; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <header><h1>🌌 CLICK EMPIRE</h1></header>

    <div class="tabs">
        <button class="tab active" onclick="switchTab(0)">Главная</button>
        <button class="tab" onclick="switchTab(1)">Магазин</button>
        <button class="tab" onclick="switchTab(2)">Rebirth</button>
        <button class="tab" onclick="switchTab(3)">🏆 Достижения</button>
    </div>

    <div id="panel-0" class="panel active">
        <div class="stats">Клики: <span id="score">0</span></div>
        <div class="stats">Клики/сек: <span id="cps">0</span></div>
        <div id="click-area">КЛИКНИ МЕНЯ!</div>
        <div class="stats">Множитель: <span id="multi">1.00</span>x</div>
    </div>

    <div id="panel-1" class="panel">
        <h2>🏭 Магазин Империи</h2>
        <div class="shop-grid" id="shop"></div>
    </div>

    <div id="panel-2" class="panel">
        <h2>🔄 Rebirth</h2>
        <p>Минимум 1000 кликов</p>
        <button onclick="doRebirth()" style="padding:18px 50px; font-size:1.4em; background:#ff3366;">Сделать Rebirth</button>
    </div>

    <div id="panel-3" class="panel">
        <h2>🏆 Достижения</h2>
        <div id="achievements"></div>
    </div>

    <script>
        let score = 0, totalCPS = 0, clickValue = 1, rebirths = 0, clickCount = 0;

        let buildings = [
            {id:1, name:"Click Factory", base:60, prod:8, owned:0, mult:1.18},
            {id:2, name:"AI Core", base:380, prod:45, owned:0, mult:1.17},
            {id:3, name:"Energy Reactor", base:2400, prod:180, owned:0, mult:1.16},
            {id:4, name:"Empire Bank", base:16000, prod:1100, owned:0, mult:1.15}
        ];

        let achievementsList = [
            {id:1, name:"Первый клик", desc:"Сделай 100 кликов", goal:100, progress:0, unlocked:false},
            {id:2, name:"Новичок", desc:"Набери 10 000 кликов", goal:10000, progress:0, unlocked:false},
            {id:3, name:"Миллионер", desc:"1 000 000 кликов", goal:1000000, progress:0, unlocked:false},
            {id:4, name:"Rebirth Master", desc:"Сделай 10 Rebirth", goal:10, progress:0, unlocked:false},
            {id:5, name:"Click Billionaire", desc:"Набери 10 000 000 кликов", goal:10000000, progress:0, unlocked:false}
        ];

        const clickArea = document.getElementById('click-area');
        clickArea.addEventListener('click', () => {
            score += Math.floor(clickValue);
            clickCount++;
            updateUI();
            checkAchievements();
        });

        function updateUI() {
            document.getElementById('score').textContent = Math.floor(score).toLocaleString();
            document.getElementById('cps').textContent = totalCPS.toFixed(1);
            document.getElementById('multi').textContent = clickValue.toFixed(2);
        }

        function calculateCost(b) {
            return Math.floor(b.base * Math.pow(b.mult, b.owned));
        }

        function buyBuilding(id) {
            const b = buildings.find(x => x.id === id);
            const cost = calculateCost(b);
            if (score >= cost) {
                score -= cost;
                b.owned++;
                totalCPS += b.prod;
                updateUI();
                renderShop();
                checkAchievements();
            }
        }

        function renderShop() {
            const cont = document.getElementById('shop');
            cont.innerHTML = '';
            buildings.forEach(b => {
                const cost = calculateCost(b);
                cont.innerHTML += `
                    <div class="item">
                        <h3>${b.name} (${b.owned})</h3>
                        <p>+${b.prod} /сек</p>
                        <p>Цена: ${cost.toLocaleString()}</p>
                        <button class="buy-btn" onclick="buyBuilding(${b.id})">Купить</button>
                    </div>`;
            });
        }

        function doRebirth() {
            if (score < 1000) return alert("Нужно минимум 1000 кликов!");
            rebirths++;
            clickValue = Math.pow(2, rebirths);
            score = 0;
            totalCPS = 0;
            buildings.forEach(b => b.owned = 0);
            updateUI();
            renderShop();
            checkAchievements();
            alert(`Rebirth #${rebirths} выполнен!`);
        }

        function checkAchievements() {
            achievementsList[0].progress = clickCount;
            achievementsList[1].progress = score;
            achievementsList[2].progress = score;
            achievementsList[3].progress = rebirths;
            achievementsList[4].progress = score;
            renderAchievements();
        }

        function renderAchievements() {
            const cont = document.getElementById('achievements');
            cont.innerHTML = '';
            achievementsList.forEach(a => {
                const unlocked = a.progress >= a.goal;
                cont.innerHTML += `
                    <div style="background:${unlocked?'#003322':'#220033'}; padding:14px; margin:10px 0; border-radius:12px; border-left:6px solid ${unlocked?'#00ff88':'#666'};">
                        <strong>${a.name}</strong><br>
                        ${a.desc} <small>(${Math.floor(a.progress).toLocaleString()} / ${a.goal.toLocaleString()})</small>
                    </div>`;
            });
        }

        function switchTab(n) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
            document.getElementById(`panel-${n}`).classList.add('active');
            if (n === 1) renderShop();
            if (n === 3) renderAchievements();
        }

        setInterval(() => {
            score += totalCPS / 10;
            updateUI();
            checkAchievements();
        }, 100);

        renderShop();
        updateUI();
        renderAchievements();
    </script>
</body>
</html>
